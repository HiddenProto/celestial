<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>*{margin:0;padding:0;}html,body{width:320px;height:180px;overflow:hidden;background:#000;}</style>
</head>
<body>
<iframe id="yt" allow="autoplay;encrypted-media" frameborder="0"
  style="position:absolute;top:0;left:0;width:320px;height:180px;border:none;"></iframe>
<script>
var yt = document.getElementById('yt');
var m = location.search.match(/[?&]id=([^&]+)/);
var autoplay = /[?&]play=1/.test(location.search) ? 1 : 0;
if (m) {
  yt.src = 'https://www.youtube.com/embed/' + decodeURIComponent(m[1]) +
    '?enablejsapi=1&autoplay=' + autoplay + '&rel=0&iv_load_policy=3';
}
window.addEventListener('message', function(e) {
  if (e.source === yt.contentWindow) {
    window.parent.postMessage(e.data, '*');
  } else if (e.source === window.parent && yt.contentWindow) {
    yt.contentWindow.postMessage(e.data, '*');
  }
});
</script>
</body>
</html>
